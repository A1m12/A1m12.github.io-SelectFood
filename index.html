<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>혼밥 도우미 - 소개</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --teal-deep: #0F6E56;
            --teal-mid: #1D9E75;
            --teal-light: #E1F5EE;
            --teal-border: #5DCAA5;
        }
        body {
            background: #F4F7F5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        .header {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid #E2EBE7;
            position: sticky; top: 0; z-index: 50;
        }
        .logo { color: var(--teal-deep); font-weight: 700; font-size: 15px; text-decoration: none; display: flex; align-items: center; gap: 6px; }
        .nav a { font-size: 13px; color: #7A9080; text-decoration: none; font-weight: 500; }
        .nav a.active { color: var(--teal-deep); font-weight: 700; }
        .section-card {
            background: #fff;
            border: 1px solid #E2EBE7;
            border-radius: 16px;
            padding: 40px 24px;
            text-align: center;
        }
        .btn-fill-teal {
            background: var(--teal-deep);
            color: #E1F5EE;
            border: none;
            font-size: 14px; font-weight: 600;
            padding: 12px 24px; border-radius: 10px;
            cursor: pointer; transition: background 0.15s;
            display: inline-block; text-decoration: none;
        }
        .btn-fill-teal:hover { background: #085041; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <header class="header">
        <div class="max-w-6xl mx-auto px-5 h-14 flex items-center justify-between">
            <a href="index.html" class="logo">🍳 혼밥 도우미</a>
            <nav class="nav flex gap-5">
                <a href="index.html" class="active">소개</a>
                <a href="main.html">추천기 실행</a>
            </nav>
        </div>
    </header>

    <main class="flex-1 max-w-3xl w-full mx-auto p-4 lg:p-7 flex flex-col justify-center">
        <div class="section-card shadow-sm">
            <div style="font-size: 48px; margin-bottom: 20px;">🍳</div>
            <h1 class="text-2xl font-bold text-gray-800 mb-3">혼밥 도우미에 오신 것을 환영합니다</h1>
            <p class="text-gray-500 mb-8 leading-relaxed">
                오늘 어떤 음식을 먹을지, 그리고 그 음식과 가장 잘 어울리는 유튜브 영상 장르는 무엇일지 고민인가요?<br>
                혼밥 도우미 추천기를 통해 보다 재밌고 편리한 혼밥 경험을 만들어 보세요.
            </p>
            <a href="main.html" class="btn-fill-teal">추천기 시작하기 →</a>
        </div>
    </main>

</body>
</html>
