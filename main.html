<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>혼밥 도우미 - 추천기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .spinning { animation: spin 0.1s linear infinite; }

        :root {
            --teal-deep: #0F6E56;
            --teal-mid: #1D9E75;
            --teal-light: #E1F5EE;
            --teal-border: #5DCAA5;
            --coral-deep: #993C1D;
            --coral-mid: #D85A30;
            --coral-light: #FAECE7;
            --coral-border: #F0997B;
            --blue-deep: #185FA5;
            --blue-light: #E6F1FB;
            --blue-border: #85B7EB;
        }

        body {
            background: #F4F7F5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        .header {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid #E2EBE7;
            position: sticky; top: 0; z-index: 50;
        }

        .logo { color: var(--teal-deep); font-weight: 700; font-size: 15px; text-decoration: none; display: flex; align-items: center; gap: 6px; }
        .nav a { font-size: 13px; color: #7A9080; text-decoration: none; font-weight: 500; }
        .nav a.active { color: var(--teal-deep); font-weight: 700; }

        .section-card {
            background: #fff;
            border: 1px solid #E2EBE7;
            border-radius: 16px;
            padding: 24px;
        }

        .section-label {
            display: flex; align-items: center; gap: 8px; margin-bottom: 20px;
        }
        .section-label-bar {
            width: 3px; height: 20px; border-radius: 2px;
        }
        .section-label h2 { font-size: 15px; font-weight: 600; color: #1a2a22; }

        .btn-outline-teal {
            border: 1.5px solid var(--teal-mid);
            color: var(--teal-deep);
            background: transparent;
            font-size: 13px; font-weight: 600;
            padding: 10px 16px; border-radius: 10px;
            cursor: pointer; transition: background 0.15s;
            width: 100%;
        }
        .btn-outline-teal:hover { background: var(--teal-light); }

        .btn-fill-teal {
            background: var(--teal-deep);
            color: #E1F5EE;
            border: none;
            font-size: 13px; font-weight: 600;
            padding: 10px 16px; border-radius: 10px;
            cursor: pointer; transition: background 0.15s;
            width: 100%;
        }
        .btn-fill-teal:hover { background: #085041; }

        .btn-outline-coral {
            border: 1.5px solid var(--coral-mid);
            color: var(--coral-deep);
            background: transparent;
            font-size: 13px; font-weight: 600;
            padding: 10px 16px; border-radius: 10px;
            cursor: pointer; transition: background 0.15s;
            width: 100%;
        }
        .btn-outline-coral:hover { background: var(--coral-light); }

        .btn-fill-coral {
            background: var(--coral-mid);
            color: #fff;
            border: none;
            font-size: 13px; font-weight: 600;
            padding: 10px 16px; border-radius: 10px;
            cursor: pointer; transition: background 0.15s;
            width: 100%;
        }
        .btn-fill-coral:hover { background: var(--coral-deep); }

        .select-panel {
            display: none;
            background: #F4F7F5;
            border: 1px solid #E2EBE7;
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 16px;
        }
        .select-panel.open { display: block; }
        .panel-label { font-size: 11px; font-weight: 700; color: #8FA89A; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 10px; }

        .cat-btn {
            background: #fff;
            border: 1px solid #D4E4DC;
            color: #3a5a48;
            font-size: 12px; font-weight: 600;
            padding: 7px 10px; border-radius: 8px;
            cursor: pointer; transition: all 0.12s;
            text-align: center;
        }
        .cat-btn:hover { border-color: var(--teal-mid); color: var(--teal-deep); background: var(--teal-light); }

        .genre-btn {
            background: #fff;
            border: 1px solid #D4E4DC;
            color: #3a5a48;
            font-size: 12px; font-weight: 600;
            padding: 7px 12px; border-radius: 8px;
            cursor: pointer; transition: all 0.12s;
            text-align: left;
        }
        .genre-btn:hover { border-color: var(--coral-mid); color: var(--coral-deep); background: var(--coral-light); }

        .result-box-dark {
            background: #0d1f17;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
        .result-box-light {
            background: #F4F7F5;
            border: 1px solid #E2EBE7;
            border-radius: 12px;
            padding: 16px;
            text-align: center;
        }

        .result-label { font-size: 11px; font-weight: 600; color: #6A9080; margin-bottom: 4px; }
        .result-value-dark { font-size: 17px; font-weight: 700; color: #fff; min-height: 28px; display: flex; align-items: center; justify-content: center; }
        .result-value-teal { font-size: 16px; font-weight: 700; color: var(--teal-deep); min-height: 26px; display: flex; align-items: center; justify-content: center; }

        .summary-teal { background: var(--teal-light); border: 1px solid #9FE1CB; border-radius: 12px; padding: 14px; text-align: center; }
        .summary-coral { background: var(--coral-light); border: 1px solid var(--coral-border); border-radius: 12px; padding: 14px; text-align: center; }
        .summary-label-teal { font-size: 11px; font-weight: 700; color: var(--teal-mid); margin-bottom: 3px; }
        .summary-label-coral { font-size: 11px; font-weight: 700; color: var(--coral-mid); margin-bottom: 3px; }
        .summary-value-teal { font-size: 15px; font-weight: 700; color: #085041; }
        .summary-value-coral { font-size: 15px; font-weight: 700; color: var(--coral-deep); }

        .empty-panel {
            border: 1.5px dashed #C8D8D0;
            border-radius: 14px;
            padding: 48px 24px;
            background: #F4F7F5;
            display: flex; align-items: center; justify-content: center;
            min-height: 280px;
        }

        .matched-badge {
            display: none;
            font-size: 11px; font-weight: 700;
            background: var(--coral-light);
            color: var(--coral-deep);
            border: 1px solid var(--coral-border);
            padding: 4px 12px; border-radius: 99px;
        }
        .matched-badge.show { display: inline-block; }

        .yt-cta {
            display: inline-flex; align-items: center; gap: 8px;
            background: #FF0000;
            color: #fff;
            font-size: 13px; font-weight: 700;
            padding: 12px 24px; border-radius: 10px;
            text-decoration: none; cursor: pointer; border: none;
            transition: background 0.15s;
        }
        .yt-cta:hover { background: #cc0000; }

        .keyword-box {
            background: #0d1f17;
            border: 1px solid #1a3628;
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 12px; font-family: monospace;
            color: #5DCAA5;
            text-align: left;
            word-break: break-all;
            user-select: all;
        }

        .roulette-spinner {
            display: none;
            width: 36px; height: 36px;
            border: 3px solid var(--teal-border);
            border-top-color: transparent;
            border-radius: 50%;
            margin: 0 auto 10px;
        }
        .roulette-spinner.show { display: block; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <header class="header">
        <div class="max-w-6xl mx-auto px-5 h-14 flex items-center justify-between">
            <a href="index.html" class="logo">🍳 혼밥 도우미</a>
            <nav class="nav flex gap-5">
                <a href="index.html">소개</a>
                <a href="main.html" class="active">랜덤 추천 실행기</a>
            </nav>
        </div>
    </header>

    <main class="flex-1 max-w-6xl w-full mx-auto p-4 lg:p-7 flex flex-col gap-5">

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-5">

            <div class="section-card">
                <div class="section-label">
                    <div class="section-label-bar" style="background: var(--teal-deep);"></div>
                    <h2>음식 선택</h2>
                </div>

                <div class="grid grid-cols-2 gap-3 mb-4">
                    <button class="btn-outline-teal" onclick="togglePanel('food-select-view')">카테고리 선택</button>
                    <button class="btn-fill-teal" onclick="runFoodRoulette()">랜덤 룰렛</button>
                </div>

                <div id="food-select-view" class="select-panel">
                    <p class="panel-label">카테고리 선택</p>
                    <div class="grid grid-cols-4 gap-2" id="category-buttons-container"></div>
                </div>

                <div class="result-box-dark">
                    <div id="roulette-visual" class="roulette-spinner spinning"></div>
                    <p class="result-label">선택된 음식</p>
                    <div id="food-result" class="result-value-dark">—</div>
                </div>
            </div>

            <div class="section-card">
                <div class="section-label">
                    <div class="section-label-bar" style="background: var(--coral-mid);"></div>
                    <h2>영상 장르 선택</h2>
                </div>

                <div class="grid grid-cols-2 gap-3 mb-4">
                    <button class="btn-outline-coral" onclick="togglePanel('video-select-view')">장르 직접 선택</button>
                    <button class="btn-fill-coral" onclick="runVideoRoulette()">장르 랜덤</button>
                </div>

                <div id="video-select-view" class="select-panel">
                    <p class="panel-label">선호 장르 선택</p>
                    <div class="grid grid-cols-2 gap-2" id="genre-buttons-container"></div>
                </div>

                <div class="result-box-light">
                    <p class="result-label">선택된 장르</p>
                    <div id="video-result" class="result-value-teal">음식 선택 시 자동 추천</div>
                </div>
            </div>
        </div>

        <div class="section-card">
            <div class="flex items-center justify-between mb-5 pb-4" style="border-bottom: 1px solid #E2EBE7;">
                <div class="section-label" style="margin-bottom: 0;">
                    <div class="section-label-bar" style="background: var(--coral-mid);"></div>
                    <h2>매칭 결과 및 유튜브 바로가기</h2>
                </div>
                <span id="match-status" class="matched-badge">MATCHED</span>
            </div>

            <div class="grid grid-cols-2 gap-3 mb-5">
                <div class="summary-teal">
                    <p class="summary-label-teal">선택된 메뉴</p>
                    <p id="food-summary-val" class="summary-value-teal">—</p>
                </div>
                <div class="summary-coral">
                    <p class="summary-label-coral">선택된 장르</p>
                    <p id="genre-summary-val" class="summary-value-coral">음식 선택 시 자동 추천</p>
                </div>
            </div>

            <div id="display-panel" class="empty-panel">
                <div class="text-center max-w-xs">
                    <div style="font-size: 36px; margin-bottom: 10px;">🍳</div>
                    <p style="font-size: 14px; font-weight: 600; color: #3a5a48; margin-bottom: 4px;">준비 완료</p>
                    <p style="font-size: 13px; color: #8FA89A; line-height: 1.6;">음식을 선택하면 재밌는 유튜브 영상을 바로 검색할 수 있어요.</p>
                </div>
            </div>
        </div>

    </main>

    <footer class="py-4 text-center" style="font-size: 12px; color: #8FA89A;">
        &copy; 2026 혼밥 도우미. All rights reserved.
    </footer>

    let selectedFood = null;
    let selectedGenre = null;

    window.onload = function() {
        initCategoryButtons();
        initGenreButtons();
    };

    function initCategoryButtons() {
        const container = document.getElementById("category-buttons-container");
        const categories = Object.keys(foodDatabase);
        categories.forEach(cat => {
            const btn = document.createElement("button");
            btn.className = "cat-btn";
            btn.innerText = cat;
            btn.onclick = () => selectFoodByCategory(cat);
            container.appendChild(btn);
        });
    }

    function initGenreButtons() {
        const container = document.getElementById("genre-buttons-container");
        genreKeywords.forEach(genre => {
            const btn = document.createElement("button");
            btn.className = "genre-btn";
            btn.innerText = `# ${genre}`;
            btn.onclick = () => selectGenreDirect(genre);
            container.appendChild(btn);
        });
    }

    function togglePanel(id) {
        const panel = document.getElementById(id);
        panel.classList.toggle("open");
    }

    function selectFoodByCategory(cat) {
        const list = foodDatabase[cat];
        const pick = list[Math.floor(Math.random() * list.length)];
        setFoodResult(pick);
        document.getElementById("food-select-view").classList.remove("open");
    }

    function runFoodRoulette() {
        const visual = document.getElementById("roulette-visual");
        const resultDisplay = document.getElementById("food-result");
        const allFoods = Object.values(foodDatabase).flat();

        visual.classList.add("show");
        resultDisplay.innerText = "고르는 중...";

        let count = 0;
        const interval = setInterval(() => {
            resultDisplay.innerText = allFoods[Math.floor(Math.random() * allFoods.length)].name;
            count++;
            if (count > 18) {
                clearInterval(interval);
                visual.classList.remove("show");
                const finalPick = allFoods[Math.floor(Math.random() * allFoods.length)];
                setFoodResult(finalPick);
            }
        }, 80);
    }

    function setFoodResult(foodObj) {
        selectedFood = foodObj;
        document.getElementById("food-result").innerText = selectedFood.name;
        document.getElementById("food-summary-val").innerText = selectedFood.name;

        if (!selectedGenre) {
            document.getElementById("video-result").innerText = `# ${selectedFood.defaultKeyword} (추천)`;
            document.getElementById("genre-summary-val").innerText = `# ${selectedFood.defaultKeyword} (추천)`;
        }
        executeMatrixMatching();
    }

    function selectGenreDirect(genre) {
        selectedGenre = genre;
        document.getElementById("video-result").innerText = `# ${selectedGenre}`;
        document.getElementById("genre-summary-val").innerText = `# ${selectedGenre}`;
        document.getElementById("video-select-view").classList.remove("open");
        executeMatrixMatching();
    }

    function runVideoRoulette() {
        const resultDisplay = document.getElementById("video-result");
        let count = 0;
        const interval = setInterval(() => {
            resultDisplay.innerText = `# ${genreKeywords[Math.floor(Math.random() * genreKeywords.length)]}`;
            count++;
            if (count > 14) {
                clearInterval(interval);
                const finalGenre = genreKeywords[Math.floor(Math.random() * genreKeywords.length)];
                selectedGenre = finalGenre;
                resultDisplay.innerText = `# ${selectedGenre}`;
                document.getElementById("genre-summary-val").innerText = `# ${selectedGenre}`;
                executeMatrixMatching();
            }
        }, 80);
    }

    function executeMatrixMatching() {
        if (!selectedFood) {
            const panel = document.getElementById("display-panel");
            panel.style.cssText = "border: 1.5px dashed #C8D8D0; border-radius: 14px; padding: 48px 24px; background: #F4F7F5; display: flex; align-items: center; justify-content: center; min-height: 280px;";
            panel.innerHTML = `
                <div class="text-center max-w-xs">
                    <div style="font-size: 32px; margin-bottom: 10px;">⚠️</div>
                    <p style="font-size: 14px; font-weight: 600; color: #BA7517; margin-bottom: 4px;">메뉴를 먼저 선택해주세요</p>
                    <p style="font-size: 13px; color: #8FA89A; line-height: 1.6;">음식을 결정하면 추천 영상이 여기에 나타나요.</p>
                </div>
            `;
            return;
        }

        document.getElementById("match-status").classList.add("show");
        const finalGenre = selectedGenre ? selectedGenre : selectedFood.defaultKeyword;

        let videoPool;
        if (!selectedGenre || selectedGenre === selectedFood.defaultKeyword) {
            videoPool = selectedFood.videos;
        } else {
            videoPool = genrePool[finalGenre] || selectedFood.videos;
        }

        const pick = videoPool[Math.floor(Math.random() * videoPool.length)];
        renderVideoCard(pick, finalGenre);
    }

    function renderVideoCard(video, genre) {
        const panel = document.getElementById("display-panel");
        panel.style.cssText = "border: none; background: transparent; padding: 0; min-height: auto; display: block;";

        const ytIcon = `<svg width="16" height="16" viewBox="0 0 24 24" fill="white" style="flex-shrink:0"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>`;

        panel.innerHTML = `
            <div style="background: #0d1f17; border-radius: 14px; padding: 28px 24px; display: flex; flex-direction: column; align-items: center; gap: 18px; text-align: center;">
                <div>
                    <p style="font-size: 11px; color: #5DCAA5; font-weight: 700; letter-spacing: 0.06em; margin-bottom: 8px;">추천 영상</p>
                    <p style="font-size: 17px; font-weight: 700; color: #fff; line-height: 1.4;">${video.title}</p>
                    <p style="font-size: 12px; color: #4a7060; margin-top: 6px;"># ${genre}</p>
                </div>
                <a href="${video.url}" target="_blank" class="yt-cta">
                    ${ytIcon}
                    YouTube에서 바로 보기
                </a>
            </div>
        `;
    }
